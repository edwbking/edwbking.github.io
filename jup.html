<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Portal Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <style>
        /* Base Reset & Background Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            /* Fullscreen Background Image */
            background: url('https://cdn.pixelcaster.com/public.pixelcaster.com/snapshots/wyndham-grand-jupiter/latest.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* Initial Start Screen Overlay (Required by browsers to activate Wakelock) */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        /* Dashboard Layout Grid */
        .dashboard {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0; /* Hidden until button click */
            transition: opacity 1s ease;
        }

        .row-top, .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .row-bottom {
            align-items: flex-end;
        }

        /* Glassmorphism Styling for Overlays */
        .panel {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Weather Widget */
        .weather {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .weather .icon { font-size: 48px; line-height: 1; }
        .weather .temp { font-size: 52px; font-weight: bold; line-height: 1; margin-bottom: 5px; }
        .weather .details { font-size: 18px; opacity: 0.8; font-weight: 300; }

        /* Time & Date Widget */
        .datetime { text-align: right; }
        .datetime .time { font-size: 72px; font-weight: bold
