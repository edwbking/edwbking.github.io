<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Display with Clock, Weather, and Sports Ticker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #bg-image { width: 100%; height: 100%; object-fit: cover; display: none; }

        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }

        button {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background-color: #0084ff; color: white; border: none; border-radius: 10px;
            margin-top: 20px; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        /* Date and Time (Bottom Right) */
        #datetime-overlay {
            position: absolute; bottom: 30px; right: 40px;
            color: white; text-align: right;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9); z-index: 5; display: none; 
        }

        #time { font-size: 80px; font-weight: bold; margin: 0; line-height: 1; }
        #date { font-size: 32px; margin: 5px 0 0 0; font-weight: 300; }

        /* Weather (Top Right) */
        #weather-overlay {
            position: absolute; top: 60px; right: 40px;
            color: white; text-align: right;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9); z-index: 5; display: none; 
        }

        #weather-temp { font-size: 60px; font-weight: bold; margin: 0; }
        #weather-desc { font-size: 24px; margin: 5px 0 0 0; }

        /* Stock Ticker (Top Edge) */
        #stock-ticker-overlay {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 5; display: none; 
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.6));
        }

        /* NEW: Sports Ticker (Bottom Edge) */
        #sports-ticker-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0, 0, 0, 0.6); color: white; overflow: hidden;
            white-space: nowrap; z-index: 5; display: none; line-height: 40px;
            font-size: 18px; border-top: 1px solid rgba(255,255,255,0.2);
        }

        .ticker-content {
            display: inline-block; padding-left: 100%;
            animation: ticker-scroll 60s linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .ticker-item { margin-right: 50px; font-weight: bold; }
        .ticker-item span { color: #0084ff; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>Meta Portal Display</h1>
        <button id="start-btn">Start Display</button>
    </div>

    <img id="bg-image" src="" alt="Fullscreen Display">

    <div id="stock-ticker-overlay">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "DJ:DJI", "title": "Dow 30"},
                    {"proName": "FOREXCOM:SPXUSD", "title": "S&P 500"},
                    {"description": "Nvidia", "proName": "NASDAQ:NVDA"}
                ],
                "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
            }
            </script>
        </div>
    </div>

    <div id="sports-ticker-overlay">
        <div id="sports-content" class="ticker-content">
            <span class="ticker-item"><span>SPORTS:</span> Loading live updates...</span>
        </div>
    </div>

    <div id="weather-overlay">
        <p id="weather-temp">--°F</p>
        <p id="weather-desc">Loading...</p>
    </div>

    <div id="datetime-overlay">
        <p id="time"></p>
        <p id="date"></p>
    </div>

    <script>
        const imageUrl = 'https://cdn.pixelcaster.com/public.pixelcaster.com/snapshots/wyndham-grand-jupiter/latest.jpg'; 
        const lat = 26.9342; // Updated for Jupiter, FL
        const lon = -80.0805;

        const noSleep = new NoSleep();
        const startBtn = document.getElementById('start-btn');
        const sportsTicker = document.getElementById('sports-ticker-overlay');

        // NEW: Function to fetch sports news from ESPN RSS via a proxy
        async function updateSports() {
            try {
                // Using a public RSS-to-JSON proxy to get ESPN Top Headlines
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.espn.com/espn/rss/news`);
                const data = await response.json();
                const container = document.getElementById('sports-content');
                
                if (data.items) {
                    container.innerHTML = data.items.map(item => 
                        `<span class="ticker-item"><span>•</span> ${item.title.toUpperCase()}</span>`
                    ).join('') + data.items.map(item => 
                        `<span class="ticker-item"><span>•</span> ${item.title.toUpperCase()}</span>`
                    ).join(''); // Duplicate for seamless looping
                }
            } catch (e) {
                console.error("Sports fetch failed", e);
            }
        }

        function updateDateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`);
                const data = await res.json();
                document.getElementById('weather-temp').textContent = `${Math.round(data.current.temperature_2m)}°F`;
                document.getElementById('weather-desc').textContent = '☀️ Clear'; // Simplified for example
            } catch (e) {}
        }

        startBtn.addEventListener('click', () => {
            noSleep.enable();
            document.documentElement.requestFullscreen();
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('bg-image').style.display = 'block';
            document.getElementById('datetime-overlay').style.display = 'block';
            document.getElementById('weather-overlay').style.display = 'block';
            document.getElementById('stock-ticker-overlay').style.display = 'block';
            sportsTicker.style.display = 'block';

            updateDateTime();
            setInterval(updateDateTime, 1000);
            updateWeather();
            updateSports();
            setInterval(updateSports, 30 * 60 * 1000); // Update sports every 30 mins
            
            setInterval(() => {
                document.getElementById('bg-image').src = `${imageUrl}?t=${new Date().getTime()}`;
            }, 30000);
        });
    </script>
</body>
</html>
