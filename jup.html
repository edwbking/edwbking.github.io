<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Display with Clock and Weather</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <style>
        /* Reset margins and prevent scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Full screen image styling */
        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: none; /* Hidden until the user interacts */
        }

        /* Overlay to force a user click */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #0084ff;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        /* Date and Time Overlay Styling (Bottom Right) */
        #datetime-overlay {
            position: absolute;
            bottom: 40px;
            right: 40px;
            color: white;
            text-align: right;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0px 0px 20px rgba(0, 0, 0, 0.5);
            z-index: 5;
            display: none; 
        }

        #time {
            font-size: 80px;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        #date {
            font-size: 32px;
            margin: 5px 0 0 0;
            font-weight: 300;
        }

        /* Weather Overlay Styling (Top Right) */
        #weather-overlay {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            text-align: right;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0px 0px 20px rgba(0, 0, 0, 0.5);
            z-index: 5;
            display: none; 
        }

        #weather-temp {
            font-size: 60px;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        #weather-desc {
            font-size: 24px;
            margin: 5px 0 0 0;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>Meta Portal Display</h1>
        <p>Tap to start full screen, enable keep-awake, and load image.</p>
        <button id="start-btn">Start Display</button>
    </div>

    <img id="bg-image" src="" alt="Fullscreen Display">

    <div id="weather-overlay">
        <p id="weather-temp">--°F</p>
        <p id="weather-desc">Loading...</p>
    </div>

    <div id="datetime-overlay">
        <p id="time"></p>
        <p id="date"></p>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Your current Wyndam Grand Jupiter URL
        const imageUrl = 'https://cdn.pixelcaster.com/public.pixelcaster.com/snapshots/wyndham-grand-jupiter/latest.jpg'; 
        const refreshIntervalMs = 30 * 1000; // 30 seconds
        
        // Stuart, FL Coordinates for Weather
        const lat = 27.1975;
        const lon = -80.2528;
        // ---------------------

        const noSleep = new NoSleep();
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const bgImage = document.getElementById('bg-image');
        
        const datetimeOverlay = document.getElementById('datetime-overlay');
        const timeEl = document.getElementById('time');
        const dateEl = document.getElementById('date');

        const weatherOverlay = document.getElementById('weather-overlay');
        const weatherTemp = document.getElementById('weather-temp');
        const weatherDesc = document.getElementById('weather-desc');

        // Function to update the clock and date
        function updateDateTime() {
            const now = new Date();
            timeEl.textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            dateEl.textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }

        // Function to fetch weather from Open-Meteo
        async function updateWeather() {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`);
                const data = await response.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                
                weatherTemp.textContent = `${temp}°F`;
                weatherDesc.textContent = getWeatherIcon(code);
            } catch (error) {
                console.error("Error fetching weather:", error);
            }
        }

        // Convert WMO Weather codes to Text and Emoji
        function getWeatherIcon(code) {
            if (code === 0) return '☀️ Clear';
            if (code === 1) return '🌤️ Mostly Clear';
            if (code === 2) return '⛅ Partly Cloudy';
            if (code === 3) return '☁️ Overcast';
            if (code === 45 || code === 48) return '🌫️ Fog';
            if (code >= 51 && code <= 67) return '🌧️ Rain';
            if (code >= 71 && code <= 77) return '❄️ Snow';
            if (code >= 80 && code <= 82) return '🌦️ Showers';
            if (code >= 95 && code <= 99) return '⛈️ Thunderstorms';
            return 'Weather';
        }

        // Function triggered by the user's first tap
        startBtn.addEventListener('click', function() {
            // 1. Enable wake lock
            noSleep.enable();

            // 2. Request Full Screen
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { 
                elem.webkitRequestFullscreen();
            }

            // 3. Reveal elements
            startOverlay.style.display = 'none';
            bgImage.style.display = 'block';
            datetimeOverlay.style.display = 'block';
            weatherOverlay.style.display = 'block';

            // 4. Start Clock
            updateDateTime();
            setInterval(updateDateTime, 1000);

            // 5. Start Weather (Updates every 15 mins to save bandwidth)
            updateWeather();
            setInterval(updateWeather, 15 * 60 * 1000); 

            // 6. Start Image slideshow
            refreshImage();
            setInterval(refreshImage, refreshIntervalMs);
        }, false);

        // Function to fetch the image again
        function refreshImage() {
            const timestamp = new Date().getTime();
            const separator = imageUrl.includes('?') ? '&' : '?';
            bgImage.src = `${imageUrl}${separator}t=${timestamp}`;
        }
    </script>

</body>
</html>
