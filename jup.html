<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Display with Clock, Weather, and Dow</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <style>
        /* Reset margins and prevent scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Full screen image styling */
        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: none; /* Hidden until the user interacts */
        }

        /* Overlay to force a user click */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #0084ff;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        /* Date and Time Overlay Styling (Bottom Right) */
        #datetime-overlay {
            position: absolute;
            bottom: 40px;
            right: 40px;
            color: white;
            text-align: right;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0px 0px 20px rgba(0, 0, 0, 0.5);
            z-index: 5;
            display: none; 
        }

        #time {
            font-size: 80px;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        #date {
            font-size: 32px;
            margin: 5px 0 0 0;
            font-weight: 300;
        }

        /* Weather Overlay Styling (Top Right) */
        #weather-overlay {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            text-align: right;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0px 0px 20px rgba(0, 0, 0, 0.5);
            z-index: 5;
            display: none; 
        }

        #weather-temp {
            font-size: 60px;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        #weather-desc {
            font-size: 24px;
            margin: 5px 0 0 0;
            font-weight: 300;
        }

        /* Dow Tracker Overlay Styling (Top Left) */
        #dow-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 5;
            display: none; 
            /* Subtle shadow to help the widget pop if the background is bright */
            filter: drop-shadow(0px 0px 10px rgba(0,0,0,0.8));
        }
    </style>
</head>

    <div id="start-overlay
