<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quad Stream Player</title>
    <!-- HLS.js Library for M3U8 support in non-Safari browsers -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; }
        /* Grid setup for 4 even quadrants */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 2px;
        }
        .container { position: relative; background: #111; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .label {
            position: absolute; top: 5px; left: 5px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 2px 8px; font-family: sans-serif; font-size: 12px;
        }
    </style>
</head>
