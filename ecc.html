<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Device Manager (Stay Awake)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        button {
            cursor: pointer;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button.active {
            background: #28a745;
        }
    </style>
</head>
<body>

    <div id="controls">
        <p id="status" style="margin: 0 0 10px 0; font-size: 12px;">Sleep: Allowed</p>
        <button id="toggleNoSleep">Enable Stay-Awake</button>
    </div>

    <iframe src="http://192.168.10.167/network-device-manager/network/control"></iframe>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>

    <script>
        const noSleep = new NoSleep();
        const button = document.getElementById('toggleNoSleep');
        const status = document.getElementById('status');
        let isEnabled = false;

        button.addEventListener('click', function() {
            if (!isEnabled) {
                // Enable wake lock
                noSleep.enable();
                isEnabled = true;
                button.textContent = "Disable Stay-Awake";
                button.classList.add('active');
                status.textContent = "Sleep: Prevented";
            } else {
                // Disable wake lock
                noSleep.disable();
                isEnabled = false;
                button.textContent = "Enable Stay-Awake";
                button.classList.remove('active');
                status.textContent = "Sleep: Allowed";
            }
        }, false);
    </script>
</body>
</html>
