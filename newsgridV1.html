<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS M3U8 Stream Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; width: 95vw; height: 95vh; }
        .video-container { background: #000; border: 1px solid #333; position: relative; display: flex; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.6); color: white; padding: 4px 8px; font-family: sans-serif; font-size: 12px; z-index: 10; border-radius: 4px; }
    </style>
</head>
<body>

<div class="video-grid">
    <div class="video-container">
        <span class="label">Stream 1</span>
        <video id="video1" controls autoplay muted></video>
    </div>
    <div class="video-container">
        <span class="label">Stream 2</span>
        <video id="video2" controls autoplay muted></video>
    </div>
    <div class="video-container">
        <span class="label">Stream 3</span>
        <video id="video3" controls autoplay muted></video>
    </div>
    <div class="video-container">
        <span class="label">Stream 4</span>
        <video id="video4" controls autoplay muted></video>
    </div>
</div>

<script>
    const streams = [
        { id: 'video1', url: 'https://cdn-uw2-prod.tsv2.amagi.tv/linear/amg00488-foxdigital-livenowbyfox-lgus/playlist.m3u8' },
        { id: 'video2', url: 'https://www.bloomberg.com/media-manifest/streams/phoenix-us.m3u8' },
        { id: 'video3', url: 'http://41.205.93.154/MSNBC/index.m3u8' },
        { id: 'video4', url: 'http://41.205.93.154/FOX-NEWS/index.m3u8' }
    ];

    streams.forEach(stream => {
        const video = document.getElementById(stream.id);
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(stream.url);
            hls.attachMedia(video);
        } 
        // Native support (Safari/iOS)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = stream.url;
        }
    });
</script>

</body>
</html>
